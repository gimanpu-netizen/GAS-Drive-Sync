<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1006" viewBox="0 0 1920 1006" role="img" aria-label="同じ両立でも、背負う荷物は違う">
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.77 0 0 0 0 0.68 0 0 0 0.09 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <style>
      .bg{fill:#f8f1e6}.ink{fill:#463f38}.muted{fill:#786f65}.line{stroke:#6f665e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8b8177;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.soft{fill:#efe2d2}.accent{fill:#8aa0a8}.warm{fill:#d8b78f}.paper{filter:url(#paper)}
      text{font-family: 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif; letter-spacing:0}.title{font-size:66px;font-weight:700}.subtitle{font-size:40px;font-weight:500}.label{font-size:34px;font-weight:700}.small{font-size:27px;font-weight:500}.tiny{font-size:23px;font-weight:500}
    </style>
  </defs>
  <rect class="bg paper" width="100%" height="100%"/>
  <text x="960" y="105" text-anchor="middle" class="title ink">同じ両立でも、背負う荷物は違う</text>
  <text x="960" y="162" text-anchor="middle" class="subtitle muted">成功例だけを自分の基準にしない</text>
  
  <g transform="translate(230 250)">
    <path d="M40 620 C400 470 930 420 1510 210" class="line" opacity=".5"/>
    <g transform="translate(350 305)">
      <circle cx="70" cy="220" r="70" fill="none" stroke="#6f665e" stroke-width="7"/>
      <circle cx="300" cy="220" r="70" fill="none" stroke="#6f665e" stroke-width="7"/>
      <path d="M70 220 L160 95 L300 220 L175 220 L70 220 M160 95 L230 95" class="thin"/>
      <rect x="110" y="15" width="145" height="70" rx="14" class="accent" opacity=".55"/>
      <text x="183" y="60" text-anchor="middle" class="tiny ink">実家</text>
      <rect x="245" y="85" width="150" height="70" rx="14" class="warm" opacity=".55"/>
      <text x="320" y="130" text-anchor="middle" class="tiny ink">職場制度</text>
    </g>
    <g transform="translate(930 205)">
      <circle cx="70" cy="280" r="70" fill="none" stroke="#6f665e" stroke-width="7"/>
      <circle cx="300" cy="280" r="70" fill="none" stroke="#6f665e" stroke-width="7"/>
      <path d="M70 280 L160 150 L300 280 L175 280 L70 280 M160 150 L230 150" class="thin"/>
      <rect x="100" y="35" width="250" height="105" rx="16" fill="#d5b08a" stroke="#6f665e" stroke-width="5"/>
      <text x="225" y="95" text-anchor="middle" class="small ink">見えない荷物</text>
    </g>
    <text x="510" y="675" text-anchor="middle" class="small muted">支援あり</text>
    <text x="1110" y="675" text-anchor="middle" class="small muted">支援が少ない</text>
  </g>
</svg>