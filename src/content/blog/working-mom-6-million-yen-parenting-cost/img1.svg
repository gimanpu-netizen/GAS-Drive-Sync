<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1006" viewBox="0 0 1920 1006" role="img" aria-label="年収600万は、責任の高度が変わる地点">
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.77 0 0 0 0 0.68 0 0 0 0.09 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <style>
      .bg{fill:#f8f1e6}.ink{fill:#463f38}.muted{fill:#786f65}.line{stroke:#6f665e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8b8177;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.soft{fill:#efe2d2}.accent{fill:#8aa0a8}.warm{fill:#d8b78f}.paper{filter:url(#paper)}
      text{font-family: 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif; letter-spacing:0}.title{font-size:66px;font-weight:700}.subtitle{font-size:40px;font-weight:500}.label{font-size:34px;font-weight:700}.small{font-size:27px;font-weight:500}.tiny{font-size:23px;font-weight:500}
    </style>
  </defs>
  <rect class="bg paper" width="100%" height="100%"/>
  <text x="960" y="105" text-anchor="middle" class="title ink">年収600万は、責任の高度が変わる地点</text>
  <text x="960" y="162" text-anchor="middle" class="subtitle muted">収入だけでなく、見えない応答義務も増える</text>
  
  <g transform="translate(260 230)">
    <path d="M1400 570 H80 L360 250 L530 390 L740 110 L1020 430 L1180 310 Z" fill="#efe2d2" stroke="#6f665e" stroke-width="6"/>
    <path d="M80 570 C380 455 720 455 1400 570" class="thin" opacity=".35"/>
    <line x1="260" y1="360" x2="1280" y2="360" stroke="#8aa0a8" stroke-width="8" stroke-dasharray="18 18" stroke-linecap="round"/>
    <rect x="620" y="315" width="300" height="70" rx="35" fill="#8aa0a8"/>
    <text x="770" y="360" text-anchor="middle" class="label" fill="#fffaf3">年収600万</text>
    <text x="180" y="640" class="label ink">収入</text>
    <text x="900" y="92" class="label ink">責任・応答義務・認知負荷</text>
    <path d="M1000 145 C1070 120 1145 138 1195 188" class="thin" opacity=".65"/>
    <path d="M1040 205 C1110 180 1185 198 1235 248" class="thin" opacity=".5"/>
  </g>
</svg>