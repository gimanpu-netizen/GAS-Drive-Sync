<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1006" viewBox="0 0 1920 1006" role="img" aria-label="守るべきは、年収ではなく暮らし">
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.77 0 0 0 0 0.68 0 0 0 0.09 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <style>
      .bg{fill:#f8f1e6}.ink{fill:#463f38}.muted{fill:#786f65}.line{stroke:#6f665e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8b8177;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.soft{fill:#efe2d2}.accent{fill:#8aa0a8}.warm{fill:#d8b78f}.paper{filter:url(#paper)}
      text{font-family: 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif; letter-spacing:0}.title{font-size:66px;font-weight:700}.subtitle{font-size:40px;font-weight:500}.label{font-size:34px;font-weight:700}.small{font-size:27px;font-weight:500}.tiny{font-size:23px;font-weight:500}
    </style>
  </defs>
  <rect class="bg paper" width="100%" height="100%"/>
  <text x="960" y="105" text-anchor="middle" class="title ink">守るべきは、年収ではなく暮らし</text>
  <text x="960" y="162" text-anchor="middle" class="subtitle muted">収入・時間・注意力を再設計する</text>
  
  <g transform="translate(290 230)">
    <line x1="670" y1="110" x2="670" y2="560" class="line"/>
    <line x1="410" y1="210" x2="930" y2="210" class="line"/>
    <path d="M410 210 L250 440 L570 440 Z" fill="#efe2d2" stroke="#6f665e" stroke-width="6"/>
    <path d="M930 210 L770 440 L1090 440 Z" fill="#efe2d2" stroke="#6f665e" stroke-width="6"/>
    <rect x="315" y="315" width="190" height="105" rx="12" fill="#fbf6ee" stroke="#8b8177" stroke-width="4"/>
    <text x="410" y="375" text-anchor="middle" class="small ink">給与明細</text>
    <path d="M840 310 C890 280 965 292 1005 345 L1005 425 C950 395 895 395 840 425 Z" fill="#fffaf3" stroke="#8b8177" stroke-width="4"/>
    <circle cx="800" cy="372" r="42" class="warm" opacity=".7"/>
    <path d="M800 330 V414 M758 372 H842" class="thin" opacity=".45"/>
    <rect x="505" y="545" width="330" height="76" rx="38" fill="#8aa0a8"/>
    <text x="670" y="594" text-anchor="middle" class="label" fill="#fffaf3">幸福の損益分岐点</text>
    <text x="410" y="505" text-anchor="middle" class="small muted">お金</text>
    <text x="930" y="505" text-anchor="middle" class="small muted">時間・注意力・休息</text>
  </g>
</svg>