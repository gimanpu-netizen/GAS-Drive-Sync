<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1006" viewBox="0 0 1920 1006" role="img" aria-label="家にいても、心が仕事に残る">
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.77 0 0 0 0 0.68 0 0 0 0.09 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <style>
      .bg{fill:#f8f1e6}.ink{fill:#463f38}.muted{fill:#786f65}.line{stroke:#6f665e;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#8b8177;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.soft{fill:#efe2d2}.accent{fill:#8aa0a8}.warm{fill:#d8b78f}.paper{filter:url(#paper)}
      text{font-family: 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif; letter-spacing:0}.title{font-size:66px;font-weight:700}.subtitle{font-size:40px;font-weight:500}.label{font-size:34px;font-weight:700}.small{font-size:27px;font-weight:500}.tiny{font-size:23px;font-weight:500}
    </style>
  </defs>
  <rect class="bg paper" width="100%" height="100%"/>
  <text x="960" y="105" text-anchor="middle" class="title ink">家にいても、心が仕事に残る</text>
  <text x="960" y="162" text-anchor="middle" class="subtitle muted">注意の残余 = 前の仕事が頭に残る状態</text>
  
  <g transform="translate(330 240)">
    <rect x="90" y="180" width="470" height="270" rx="24" class="soft" stroke="#6f665e" stroke-width="6"/>
    <rect x="140" y="230" width="370" height="145" rx="14" fill="#fbf6ee" stroke="#8b8177" stroke-width="4"/>
    <line x1="205" y1="430" x2="445" y2="430" class="line"/>
    <circle cx="580" cy="165" r="18" class="accent" opacity=".85"/>
    <circle cx="630" cy="120" r="12" class="accent" opacity=".55"/>
    <circle cx="675" cy="170" r="8" class="accent" opacity=".35"/>
    <path d="M590 250 C790 315 910 405 1010 540" stroke="#8aa0a8" stroke-width="58" stroke-linecap="round" fill="none" opacity=".18"/>
    <path d="M820 265 C910 220 1040 245 1105 330 L1105 515 C1028 468 920 470 820 515 Z" fill="#fffaf3" stroke="#6f665e" stroke-width="6"/>
    <path d="M820 265 C730 220 600 245 545 330 L545 515 C625 468 730 470 820 515 Z" fill="#fbf6ee" stroke="#6f665e" stroke-width="6"/>
    <line x1="820" y1="270" x2="820" y2="515" class="thin"/>
    <path d="M895 355 C955 335 1015 342 1060 375" class="thin" opacity=".55"/>
    <path d="M735 355 C675 335 620 342 582 375" class="thin" opacity=".55"/>
    <circle cx="1230" cy="445" r="65" fill="#d8b78f" opacity=".65"/>
    <path d="M1230 380 V510 M1165 445 H1295" class="thin" opacity=".35"/>
  </g>
